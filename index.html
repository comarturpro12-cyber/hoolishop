<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HOOLIGANS SNG</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Unbounded:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080808;
  --surface: #101010;
  --card: #141414;
  --card2: #181818;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.1);
  --green: #3dff1a;
  --green2: #2ecc12;
  --green-a10: rgba(61,255,26,0.1);
  --green-a05: rgba(61,255,26,0.05);
  --text: #f2f2f2;
  --text2: #888;
  --text3: #555;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}

/* SCAN LINE texture overlay */
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:9999}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;background:rgba(8,8,8,0.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 10px}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;flex-shrink:0}
.logo-text{display:flex;flex-direction:column;line-height:1}
.logo-main{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--green)}
.logo-sub{font-family:'Unbounded',sans-serif;font-size:7px;letter-spacing:4px;color:var(--text3);text-transform:uppercase;margin-top:1px}

.cart-btn{position:relative;display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:8px 14px;color:var(--text2);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.cart-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.cart-btn.active{border-color:var(--green);color:var(--green)}
.cart-count{background:var(--green);color:#000;font-size:10px;font-weight:700;border-radius:6px;padding:1px 6px;font-family:'Unbounded',sans-serif;display:none}
.cart-btn.active .cart-count{display:block}

/* CATEGORIES */
.cats{display:flex;gap:6px;overflow-x:auto;padding:0 16px 12px;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat{flex-shrink:0;display:flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--border);border-radius:20px;padding:6px 12px;color:var(--text3);font-family:'Inter',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
.cat svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.cat.on{background:var(--green);border-color:var(--green);color:#000;font-weight:600}
.cat.on svg{stroke:#000}
.cat:active{transform:scale(.93)}

/* CONTENT */
.content{padding:16px;padding-bottom:140px}
.sec-label{font-family:'Unbounded',sans-serif;font-size:9px;font-weight:600;color:var(--text3);letter-spacing:3px;text-transform:uppercase;margin-bottom:14px}

/* BANNER */
.banner{background:linear-gradient(135deg,rgba(61,255,26,0.06),rgba(61,255,26,0.02));border:1px solid rgba(61,255,26,0.15);border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:16px}
.banner-ico{width:36px;height:36px;background:rgba(61,255,26,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.banner-ico svg{width:18px;height:18px;stroke:var(--green);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.banner-t{font-family:'Unbounded',sans-serif;font-size:10px;font-weight:600;color:var(--text);margin-bottom:3px}
.banner-s{font-size:11px;color:var(--text2);line-height:1.5}
.banner-s span{color:var(--green);font-weight:500}

/* GRID */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s;position:relative;animation:fadeUp .4s ease both}
.card:active{transform:scale(.96)}
.card.in-cart{border-color:rgba(61,255,26,0.4)}
.card-img{width:100%;aspect-ratio:1;background:var(--card2);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.card:active .card-img img{transform:scale(1.05)}
.card-img-ph{width:100%;aspect-ratio:1;background:var(--card2);display:flex;align-items:center;justify-content:center}
.card-img-ph svg{width:52px;height:52px;stroke:var(--text3);fill:none;stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round}
.card-body{padding:10px}
.card-name{font-family:'Unbounded',sans-serif;font-size:10px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:6px}
.card-price{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--green);letter-spacing:1px;line-height:1}
.card-rub{font-size:10px;color:var(--text3);margin-top:2px}
.badge-cart{position:absolute;top:8px;right:8px;background:var(--green);color:#000;font-size:9px;font-weight:700;border-radius:6px;padding:3px 7px;font-family:'Unbounded',sans-serif;letter-spacing:.5px}

/* LOADER */
.loader-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px}
.loader-ring{width:36px;height:36px;border:1.5px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
.loader-txt{font-family:'Unbounded',sans-serif;font-size:9px;color:var(--text3);letter-spacing:3px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* EMPTY */
.empty-wrap{text-align:center;padding:60px 16px}
.empty-ico{margin:0 auto 14px;width:56px;height:56px;background:var(--card);border-radius:16px;display:flex;align-items:center;justify-content:center}
.empty-ico svg{width:28px;height:28px;stroke:var(--text3);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.empty-t{font-family:'Unbounded',sans-serif;font-size:11px;color:var(--text3);letter-spacing:1px}

/* OVERLAY BASE */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.on{opacity:1;pointer-events:all}
.sheet{background:var(--surface);border:1px solid var(--border);border-radius:22px 22px 0 0;width:100%;max-height:90vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1)}
.overlay.on .sheet{transform:translateY(0)}
.drag-handle{width:32px;height:3px;background:var(--border2);border-radius:2px;margin:10px auto 0}

/* PRODUCT MODAL */
.pmod-img{width:100%;aspect-ratio:4/3;object-fit:cover;background:var(--card)}
.pmod-img-ph{width:100%;aspect-ratio:4/3;background:var(--card);display:flex;align-items:center;justify-content:center}
.pmod-img-ph svg{width:80px;height:80px;stroke:var(--text3);fill:none;stroke-width:1.2;stroke-linecap:round;stroke-linejoin:round}
.pmod-body{padding:18px 16px 24px}
.pmod-cat{font-size:10px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
.pmod-name{font-family:'Unbounded',sans-serif;font-size:17px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:10px}
.pmod-price{font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--green);letter-spacing:2px;line-height:1}
.pmod-rub{font-size:13px;color:var(--text2);margin-top:3px;margin-bottom:16px}
.pmod-desc{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:20px}
.row-label{font-family:'Unbounded',sans-serif;font-size:9px;font-weight:600;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:9px}
.variants{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px}
.var-btn{background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:7px 14px;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.var-btn.on{border-color:var(--green);color:var(--green);background:var(--green-a05)}
.qty-row{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.qty-ctrl{display:flex;align-items:center;background:var(--card);border:1px solid var(--border2);border-radius:12px;overflow:hidden}
.qb{width:40px;height:40px;background:transparent;border:none;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.qb:active{background:var(--border2)}
.qv{width:36px;text-align:center;font-family:'Unbounded',sans-serif;font-size:13px;font-weight:600;color:var(--text)}
.add-btn{width:100%;background:var(--green);color:#000;border:none;border-radius:13px;padding:16px;font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .15s;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:8px}
.add-btn svg{width:16px;height:16px;stroke:#000;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.add-btn:active{transform:scale(.97);filter:brightness(.9)}
.add-btn.done{background:var(--green2)}

/* CART */
.cart-hdr{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cart-title{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700}
.close-btn{width:30px;height:30px;background:var(--card);border:1px solid var(--border2);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2)}
.close-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
.cart-items{padding:8px 16px}
.ci{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
.ci:last-child{border-bottom:none}
.ci-thumb{width:46px;height:46px;background:var(--card);border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.ci-thumb img{width:100%;height:100%;object-fit:cover}
.ci-thumb svg{width:22px;height:22px;stroke:var(--text3);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.ci-info{flex:1;min-width:0}
.ci-name{font-family:'Unbounded',sans-serif;font-size:9px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.ci-var{font-size:10px;color:var(--text3);margin-bottom:3px}
.ci-price{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--green);letter-spacing:1px}
.ci-qty{display:flex;align-items:center;background:var(--card);border:1px solid var(--border2);border-radius:10px;overflow:hidden}
.cqb{width:30px;height:30px;background:transparent;border:none;color:var(--text);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cqb:active{background:var(--border2)}
.cqv{width:24px;text-align:center;font-family:'Unbounded',sans-serif;font-size:11px;font-weight:600}
.cart-foot{padding:14px 16px;border-top:1px solid var(--border);position:sticky;bottom:0;background:var(--surface)}
.total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.total-label{font-size:12px;color:var(--text2)}
.total-kzt{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--green);letter-spacing:2px}
.total-rub{font-size:11px;color:var(--text3);text-align:right}
.buy-btn{width:100%;background:var(--green);color:#000;border:none;border-radius:13px;padding:15px;font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .15s;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:8px}
.buy-btn svg{width:16px;height:16px;stroke:#000;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.buy-btn:active{transform:scale(.97);filter:brightness(.9)}
.cart-empty-wrap{padding:48px 16px;text-align:center}
.cart-empty-wrap svg{width:44px;height:44px;stroke:var(--text3);fill:none;stroke-width:1.2;stroke-linecap:round;stroke-linejoin:round;margin:0 auto 12px;display:block}
.cart-empty-t{font-family:'Unbounded',sans-serif;font-size:10px;color:var(--text3);letter-spacing:2px}
</style>
</head>
<body>

<!-- SVG DEFS (кастомные иконки) -->
<svg style="display:none">
  <symbol id="ico-logo" viewBox="0 0 32 32">
    <polygon points="16,2 20,10 29,11 22,18 24,27 16,23 8,27 10,18 3,11 12,10" stroke-width="1.5" stroke-linejoin="round"/>

    <line x1="12" y1="22.08" x2="12" y2="12"/>

  <symbol id="ico-check" viewBox="0 0 24 24">

    <rect x="14" y="3" width="7" height="7" rx="1"/>
    <rect x="3" y="14" width="7" height="7" rx="1"/>
    <rect x="14" y="14" width="7" height="7" rx="1"/>
  </symbol>
</svg>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <div class="logo-wrap">
      <svg class="logo-icon" viewBox="0 0 32 32" fill="none" stroke="#3dff1a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="16,2 20,10 29,11 22,18 24,27 16,23 8,27 10,18 3,11 12,10"/>
        <circle cx="16" cy="16" r="3.5"/>
      </svg>
      <div class="logo-text">
        <span class="logo-main">HOOLIGANS</span>
        <span class="logo-sub">SNG SHOP</span>
      </div>
    </div>
    <button class="cart-btn" id="cartBtn" onclick="openCart()">
      <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      <span id="cartCount" class="cart-count">0</span>
    </button>
  </div>
  <div class="cats" id="cats">
    <button class="cat on" data-cat="all" onclick="setcat(this,'all')">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Все
    </button>
    <button class="cat" data-cat="кастеты" onclick="setcat(this,'кастеты')">
      <svg viewBox="0 0 24 24"><rect x="2" y="10" width="20" height="10" rx="2"/><path d="M6 10V7a2 2 0 012-2h8a2 2 0 012 2v3"/><line x1="8" y1="10" x2="8" y2="20"/><line x1="12" y1="10" x2="12" y2="20"/><line x1="16" y1="10" x2="16" y2="20"/></svg>
      Кастеты
    </button>
    <button class="cat" data-cat="дубинки" onclick="setcat(this,'дубинки')">
      <svg viewBox="0 0 24 24"><line x1="5" y1="19" x2="19" y2="5" stroke-width="3" stroke-linecap="round"/><circle cx="6" cy="18" r="3"/></svg>
      Дубинки
    </button>
    <button class="cat" data-cat="подики" onclick="setcat(this,'подики')">
      <svg viewBox="0 0 24 24"><rect x="7" y="2" width="10" height="18" rx="3"/><rect x="9" y="5" width="6" height="3" rx="1"/><circle cx="12" cy="17" r="1"/><path d="M7 9h10"/></svg>
      Подики
    </button>
    <button class="cat" data-cat="одноразки" onclick="setcat(this,'одноразки')">
      <svg viewBox="0 0 24 24"><rect x="8" y="2" width="8" height="20" rx="2"/><rect x="10" y="4" width="4" height="6" rx="1"/><line x1="10" y1="14" x2="14" y2="14"/><line x1="10" y1="17" x2="14" y2="17"/></svg>
      Одноразки
    </button>
    <button class="cat" data-cat="жижи" onclick="setcat(this,'жижи')">
      <svg viewBox="0 0 24 24"><path d="M12 2C12 2 4 10 4 14a8 8 0 0016 0c0-4-8-12-8-12z"/><path d="M9 17c0 1.66 1.34 3 3 3"/></svg>
      Жижи
    </button>
    <button class="cat" data-cat="прочее" onclick="setcat(this,'прочее')">
      <svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
      Прочее
    </button>
  </div>
</div>

<!-- CONTENT -->
<div class="content">
  <div class="banner">
    <div class="banner-ico">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
    </div>
    <div>
      <div class="banner-t">Нет нужного товара?</div>
      <div class="banner-s">Напиши <span>Асхе</span> — закажем под тебя</div>
    </div>
  </div>
  <div class="sec-label" id="secLabel">Все товары</div>
  <div id="container">
    <div class="loader-wrap">
      <div class="loader-ring"></div>
      <div class="loader-txt">Загрузка</div>
    </div>
  </div>
</div>

<!-- PRODUCT MODAL -->
<div class="overlay" id="prodOverlay" onclick="closeModOut(event)">
  <div class="sheet" id="prodSheet">
    <div class="drag-handle"></div>
    <div id="prodContent"></div>
  </div>
</div>

<!-- CART -->
<div class="overlay" id="cartOverlay" onclick="closeCartOut(event)">
  <div class="sheet" id="cartSheet">
    <div class="drag-handle"></div>
    <div class="cart-hdr">
      <div class="cart-title">Корзина</div>
      <div class="close-btn" onclick="closeCart()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
    </div>
    <div id="cartContent"></div>
  </div>
</div>

<script>
const API = "http://127.0.0.1:5000";

const CAT_ICONS = {
  'кастеты': `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="10" width="20" height="10" rx="2"/><path d="M6 10V7a2 2 0 012-2h8a2 2 0 012 2v3"/><line x1="8" y1="10" x2="8" y2="20"/><line x1="12" y1="10" x2="12" y2="20"/><line x1="16" y1="10" x2="16" y2="20"/></svg>`,
  'дубинки': `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="19" x2="19" y2="5" stroke-width="3"/><circle cx="6" cy="18" r="3"/></svg>`,
  'подики': `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="2" width="10" height="18" rx="3"/><rect x="9" y="5" width="6" height="3" rx="1"/><circle cx="12" cy="17" r="1"/><path d="M7 9h10"/></svg>`,
  'одноразки': `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2" width="8" height="20" rx="2"/><rect x="10" y="4" width="4" height="6" rx="1"/><line x1="10" y1="14" x2="14" y2="14"/><line x1="10" y1="17" x2="14" y2="17"/></svg>`,
  'жижи': `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C12 2 4 10 4 14a8 8 0 0016 0c0-4-8-12-8-12z"/><path d="M9 17c0 1.66 1.34 3 3 3"/></svg>`,
  'прочее': `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>`,
};

const CAT_NAMES = {'all':'Все товары','кастеты':'Кастеты','дубинки':'Дубинки','подики':'Подики','одноразки':'Одноразки','жижи':'Жижи','прочее':'Прочее'};

let products = [], curCat = 'all', cart = [], selProd = null, selVar = null, selQty = 1;

async function loadProducts() {
  try {
    const r = await fetch(`${API}/products`);
    const d = await r.json();
    if (d.ok) { products = d.products; render(products); }
    else showErr();
  } catch(e) { showErr(); }
}

function showErr() {
  document.getElementById('container').innerHTML = `<div class="empty-wrap"><div class="empty-ico"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div class="empty-t">Ошибка загрузки</div></div>`;
}

function render(list) {
  const c = document.getElementById('container');
  if (!list.length) {
    c.innerHTML = `<div class="empty-wrap"><div class="empty-ico"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg></div><div class="empty-t">Товаров нет</div></div>`;
    return;
  }
  const inCart = new Set(cart.map(i=>i.id));
  c.innerHTML = `<div class="grid">${list.map((p,i)=>{
    const ico = CAT_ICONS[p.category]||CAT_ICONS['прочее'];
    const imgHtml = p.image_url
      ? `<div class="card-img"><img src="${p.image_url}" alt="${p.name}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=card-img-ph style=aspect-ratio:1>${ico.replace(/stroke=/g,'stroke=')}</div>'"></div>`
      : `<div class="card-img-ph">${ico}</div>`;
    const ic = inCart.has(p.id);
    return `<div class="card${ic?' in-cart':''}" onclick="openProd(${p.id})" style="animation-delay:${i*.04}s">
      ${ic?'<div class="badge-cart">В корзине</div>':''}
      ${imgHtml}
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <div class="card-price">${p.price_kzt.toLocaleString()} ₸</div>
        <div class="card-rub">${p.price_rub.toLocaleString()} ₽</div>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function setcat(el, cat) {
  curCat = cat;
  document.querySelectorAll('.cat').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('secLabel').textContent = CAT_NAMES[cat]||cat;
  render(cat==='all' ? products : products.filter(p=>p.category===cat));
}

function openProd(id) {
  const p = products.find(x=>x.id===id);
  if (!p) return;
  selProd=p; selVar=null; selQty=1;
  const ico = CAT_ICONS[p.category]||CAT_ICONS['прочее'];
  const vars = p.variants ? p.variants.split(',').map(v=>v.trim()).filter(Boolean) : [];
  const imgHtml = p.image_url
    ? `<img class="pmod-img" src="${p.image_url}" alt="${p.name}" onerror="this.outerHTML='<div class=pmod-img-ph>${ico}</div>'">`
    : `<div class="pmod-img-ph">${ico}</div>`;
  const inCart = cart.find(i=>i.id===id);
  document.getElementById('prodContent').innerHTML = `
    ${imgHtml}
    <div class="pmod-body">
      <div class="pmod-cat">${p.category}</div>
      <div class="pmod-name">${p.name}</div>
      <div class="pmod-price">${p.price_kzt.toLocaleString()} ₸</div>
      <div class="pmod-rub">${p.price_rub.toLocaleString()} ₽</div>
      ${p.description?`<div class="pmod-desc">${p.description}</div>`:''}
      ${vars.length?`<div class="row-label">Вариант</div><div class="variants">${vars.map(v=>`<button class="var-btn" onclick="pickVar(this,'${v}')">${v}</button>`).join('')}</div>`:''}
      <div class="qty-row">
        <div class="row-label">Количество</div>
        <div class="qty-ctrl">
          <button class="qb" onclick="chQty(-1)">−</button>
          <div class="qv" id="qtyVal">1</div>
          <button class="qb" onclick="chQty(1)">+</button>
        </div>
      </div>
      <button class="add-btn${inCart?' done':''}" id="addBtn" onclick="addCart()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">${inCart?'<polyline points="20 6 9 17 4 12"/>':'<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>'}</svg>
        ${inCart?'Уже в корзине':'Добавить в корзину'}
      </button>
    </div>`;
  document.getElementById('prodOverlay').classList.add('on');
  document.body.style.overflow='hidden';
}

function pickVar(btn, v) {
  document.querySelectorAll('.var-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); selVar=v;
}

function chQty(d) {
  selQty=Math.max(1,Math.min(99,selQty+d));
  document.getElementById('qtyVal').textContent=selQty;
}

function closeModOut(e) { if(e.target===document.getElementById('prodOverlay')) closeMod(); }
function closeMod() { document.getElementById('prodOverlay').classList.remove('on'); document.body.style.overflow=''; }

function addCart() {
  if (!selProd) return;
  const ex = cart.find(i=>i.id===selProd.id && i.variant===selVar);
  if (ex) ex.qty+=selQty;
  else cart.push({id:selProd.id,name:selProd.name,price_kzt:selProd.price_kzt,price_rub:selProd.price_rub,image_url:selProd.image_url,category:selProd.category,variant:selVar,qty:selQty});
  updCartBtn();
  const btn=document.getElementById('addBtn');
  btn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Добавлено!`;
  btn.classList.add('done');
  setTimeout(()=>{closeMod(); render(curCat==='all'?products:products.filter(p=>p.category===curCat));},500);
}

function updCartBtn() {
  const t=cart.reduce((s,i)=>s+i.qty,0);
  const btn=document.getElementById('cartBtn');
  const cnt=document.getElementById('cartCount');
  if(t>0){btn.classList.add('active');cnt.textContent=t;}
  else{btn.classList.remove('active');cnt.textContent=0;}
}

function openCart() {
  renderCart();
  document.getElementById('cartOverlay').classList.add('on');
  document.body.style.overflow='hidden';
}

function closeCart() { document.getElementById('cartOverlay').classList.remove('on'); document.body.style.overflow=''; }
function closeCartOut(e) { if(e.target===document.getElementById('cartOverlay')) closeCart(); }

function renderCart() {
  const c=document.getElementById('cartContent');
  if (!cart.length) {
    c.innerHTML=`<div class="cart-empty-wrap"><svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg><div class="cart-empty-t">Корзина пустая</div></div>`;
    return;
  }
  const tkzt=cart.reduce((s,i)=>s+i.price_kzt*i.qty,0);
  const trub=cart.reduce((s,i)=>s+i.price_rub*i.qty,0);
  const ico=CAT_ICONS;
  c.innerHTML=`
    <div class="cart-items">${cart.map((item,idx)=>{
      const thumbHtml = item.image_url
        ? `<img src="${item.image_url}" onerror="this.style.display='none'">`
        : (ico[item.category]||ico['прочее']);
      return `<div class="ci">
        <div class="ci-thumb">${thumbHtml}</div>
        <div class="ci-info">
          <div class="ci-name">${item.name}</div>
          ${item.variant?`<div class="ci-var">${item.variant}</div>`:''}
          <div class="ci-price">${(item.price_kzt*item.qty).toLocaleString()} ₸</div>
        </div>
        <div class="ci-qty">
          <button class="cqb" onclick="cq(${idx},-1)">−</button>
          <div class="cqv">${item.qty}</div>
          <button class="cqb" onclick="cq(${idx},1)">+</button>
        </div>
      </div>`;
    }).join('')}</div>
    <div class="cart-foot">
      <div class="total-row">
        <div class="total-label">Итого</div>
        <div><div class="total-kzt">${tkzt.toLocaleString()} ₸</div><div class="total-rub">${trub.toLocaleString()} ₽</div></div>
      </div>
      <button class="buy-btn" onclick="checkout()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        Оформить заказ
      </button>
    </div>`;
}

function cq(idx, d) {
  cart[idx].qty=Math.max(0,cart[idx].qty+d);
  if(cart[idx].qty===0) cart.splice(idx,1);
  updCartBtn(); renderCart();
  render(curCat==='all'?products:products.filter(p=>p.category===curCat));
}

function checkout() {
  if (!cart.length) return;
  const tkzt=cart.reduce((s,i)=>s+i.price_kzt*i.qty,0);
  const trub=cart.reduce((s,i)=>s+i.price_rub*i.qty,0);
  const data={items:cart.map(i=>({id:i.id,name:i.name,variant:i.variant,qty:i.qty,price_kzt:i.price_kzt,price_rub:i.price_rub})),total_kzt:tkzt,total_rub:trub};
  if (window.Telegram && window.Telegram.WebApp) window.Telegram.WebApp.sendData(JSON.stringify(data));
  else alert('Открой через Telegram бота!');
}

if (window.Telegram && window.Telegram.WebApp) { window.Telegram.WebApp.ready(); window.Telegram.WebApp.expand(); }
loadProducts();
</script>
</body>
</html>
